<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>커넥트웨이브 채용 인텔리전스</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f4f3ef;--surf:#fff;--surf2:#faf9f7;--line:#e6e2d9;--line2:#d4cfc4;
  --text:#171410;--muted:#6e6860;--sub:#a09890;
  --red:#b92218;--red-bg:#fff1ee;--red-mid:#f4c9c3;
  --grn:#1a7a38;--grn-bg:#e8f7ee;
  --blu:#1a50a0;--blu-bg:#ecf2ff;
  --amb:#8c5200;--amb-bg:#fff5df;
  --pur:#5230b0;--pur-bg:#f0eaff;
  --sw:252px;--top:52px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.55;overflow-x:hidden}
button,input,select{font-family:inherit}
a{color:inherit;text-decoration:none}

/* ── TOPBAR ── */
.topbar{position:fixed;top:0;left:0;right:0;height:var(--top);z-index:80;
  background:rgba(255,255,255,.96);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 16px;gap:10px}
.logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:14px;letter-spacing:-.01em}
.logo-mark{width:28px;height:28px;border-radius:8px;background:var(--red);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900}
.top-r{margin-left:auto;display:flex;align-items:center;gap:8px}
.live-dot{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--grn);font-weight:600}
.live-dot i{width:7px;height:7px;border-radius:50%;background:var(--grn);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.btn{border:1px solid var(--line2);background:#fff;border-radius:8px;padding:5px 10px;
  font-size:11px;font-weight:700;cursor:pointer;transition:background .12s}
.btn:hover{background:var(--bg)}
.btn.active{background:var(--text);color:#fff;border-color:var(--text)}

/* ── SIDEBAR ── */
.side{position:fixed;top:var(--top);left:0;bottom:0;width:var(--sw);
  background:#fff;border-right:1px solid var(--line);
  display:flex;flex-direction:column;overflow:hidden;z-index:60}
.side-inner{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px 10px 16px}
.side-inner::-webkit-scrollbar{width:3px}
.side-inner::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px}

/* Calendar */
.cal-wrap{margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--line)}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding:0 2px}
.cal-head strong{font-size:12px;font-weight:800}
.cal-nav{width:24px;height:24px;border:1px solid var(--line2);border-radius:6px;
  background:#fff;cursor:pointer;font-size:13px;line-height:22px;text-align:center}
.cal-nav:hover{background:var(--bg)}
/* Strict 7-column grid, never wraps */
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:2px;width:100%}
.dow{font-size:9px;font-weight:900;color:var(--sub);text-align:center;line-height:22px}
.day{border:0;background:transparent;border-radius:6px;
  width:100%;aspect-ratio:1;padding:0;
  font-family:'DM Mono',monospace;font-size:10px;color:var(--sub);
  cursor:default;text-align:center;line-height:1;
  display:flex;align-items:center;justify-content:center;position:relative}
.day.has{color:var(--text);font-weight:700;cursor:pointer}
.day.has::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);
  width:3px;height:3px;border-radius:50%;background:var(--red)}
.day.active{background:var(--red);color:#fff;cursor:pointer}
.day.active::after{background:#fff}
.day.today{outline:1.5px solid var(--red);outline-offset:-1px}
.day.empty{cursor:default}

/* View mode buttons */
.view-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:10px}
.view-btns button{border:1px solid var(--line2);background:#fff;border-radius:7px;
  padding:5px 0;font-size:10px;font-weight:800;cursor:pointer;transition:.1s}
.view-btns button.active{background:var(--text);color:#fff;border-color:var(--text)}

/* Archive list */
.side-sec-lbl{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;
  color:var(--sub);margin-bottom:6px;padding:0 2px}
.arch-item{width:100%;border:0;background:transparent;display:flex;align-items:center;
  gap:6px;text-align:left;padding:6px 8px;border-radius:7px;cursor:pointer;
  color:var(--muted);font-size:11px;transition:.1s}
.arch-item:hover{background:var(--surf2)}
.arch-item.active{background:var(--red-bg);color:var(--red);font-weight:800}
.arch-item .arch-lbl{flex:1;text-align:left}
.arch-item .arch-sub{font-size:9px;color:var(--sub);font-weight:400}
.arch-cnt{margin-left:auto;font-family:'DM Mono';font-size:9px;
  background:var(--bg);border-radius:999px;padding:1px 6px;flex-shrink:0}
.arch-item.active .arch-cnt{background:var(--red);color:#fff}

/* ── MAIN ── */
.main{margin-left:var(--sw);padding:calc(var(--top) + 18px) 18px 60px;max-width:1240px}

/* Urgent */
.urgent{background:var(--red-bg);border:1px solid var(--red-mid);
  border-radius:14px;padding:13px 15px;margin-bottom:14px}
.urgent-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.badge{background:var(--red);color:#fff;border-radius:999px;
  padding:3px 9px;font-size:10px;font-weight:900}
.urgent-head h2{font-size:13px;font-weight:700;color:#741a13}
.urgent-list{display:flex;flex-direction:column;gap:4px}
.urgent-item{display:flex;align-items:center;gap:8px;border:0;
  background:rgba(255,255,255,.75);border-radius:8px;padding:7px 10px;
  text-align:left;cursor:pointer;width:100%;transition:background .1s}
.urgent-item:hover{background:rgba(255,255,255,.95)}
.urgent-co{font-weight:800;color:#741a13;min-width:110px;font-size:12px;flex-shrink:0}
.urgent-ttl{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.urgent-lv{font-size:9px;font-weight:900;color:var(--red);background:#fde;
  border-radius:5px;padding:1px 5px;flex-shrink:0}

/* Metrics */
.metrics{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-bottom:14px}
.metric{background:#fff;border:1px solid var(--line);border-radius:11px;padding:10px 11px}
.metric-lbl{font-size:9px;font-weight:900;color:var(--sub);letter-spacing:.07em;
  text-transform:uppercase;margin-bottom:5px}
.metric-val{font-family:'DM Mono';font-size:22px;font-weight:900;line-height:1}
.metric-cap{font-size:10px;color:var(--muted);margin-top:4px}

/* Layout */
.layout{display:grid;grid-template-columns:minmax(0,1fr) 300px;gap:12px}

/* Feed */
.feed-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.feed-title{font-size:15px;font-weight:900;letter-spacing:-.02em}
.ctl{margin-left:auto;display:flex;gap:6px}
.ctl input,.ctl select{border:1px solid var(--line2);border-radius:8px;
  padding:6px 9px;background:#fff;font-size:11px}
.chips{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.chip{border:1px solid var(--line2);background:transparent;border-radius:999px;
  padding:4px 10px;cursor:pointer;font-size:11px;color:var(--muted);
  font-weight:700;transition:.1s}
.chip.active{background:var(--text);border-color:var(--text);color:#fff}

/* Cards */
.card{background:#fff;border:1px solid var(--line);border-radius:12px;
  padding:13px 14px;margin-bottom:7px;cursor:pointer;transition:box-shadow .13s}
.card.high{border-left:4px solid var(--red)}
.card:hover{box-shadow:0 5px 16px rgba(0,0,0,.07)}
.card-meta{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-bottom:5px}
.tag{border-radius:999px;padding:2px 7px;font-size:9px;font-weight:900;letter-spacing:.02em}
.cat-leader{background:var(--pur-bg);color:#3a2580}
.cat-outflow{background:var(--red-bg);color:#741a13}
.cat-hiring{background:var(--grn-bg);color:#145530}
.cat-hr{background:var(--blu-bg);color:#123a7a}
.cat-foreign{background:var(--amb-bg);color:#5a3800}
.lv-a{background:#edf6ff;color:#0a3468;border:1px solid #c5daf4}
.lv-b{background:#eefaf2;color:#0e4a22;border:1px solid #bce4cc}
.lv-c{background:#fff9ec;color:#5a3800;border:1px solid #f0d9a0}
.card-time{font-family:'DM Mono';font-size:10px;color:var(--sub)}
.card h3{font-size:13.5px;font-weight:700;margin-bottom:4px;line-height:1.4}
.card p{color:var(--muted);font-size:11.5px;line-height:1.5}
.hashes{display:flex;gap:3px;flex-wrap:wrap;margin-top:7px}
.hash{background:var(--surf2);border-radius:999px;padding:2px 7px;
  color:var(--muted);font-size:10px;border:1px solid var(--line)}
.empty-state{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px}

/* Aside */
.aside-card{background:#fff;border:1px solid var(--line);border-radius:12px;
  padding:12px;margin-bottom:9px}
.aside-title{font-size:9px;font-weight:900;color:var(--muted);
  text-transform:uppercase;letter-spacing:.1em;margin-bottom:9px}
.rank button{width:100%;display:flex;gap:7px;align-items:center;border:0;
  background:transparent;text-align:left;padding:6px 7px;border-radius:8px;
  cursor:pointer;transition:.1s}
.rank button:hover{background:var(--surf2)}
.rank-co{font-weight:800;font-size:11.5px}
.rank-sig{font-size:10px;color:var(--muted)}
.rk{font-family:'DM Mono';color:var(--sub);width:14px;font-size:11px;flex-shrink:0}
.comp-item{border-bottom:1px solid var(--line);padding:7px 0}
.comp-item:last-child{border-bottom:0;padding-bottom:0}
.comp-item b{font-size:11.5px}
.comp-item small{display:block;color:var(--blu);font-size:10px;margin:2px 0}
.comp-item p{font-size:10.5px;color:var(--muted)}
.cred-item{display:flex;align-items:baseline;gap:7px;padding:5px 0;
  border-bottom:1px solid var(--line)}
.cred-item:last-child{border-bottom:0}
.cred-badge{font-size:10px;font-weight:900;border-radius:5px;padding:2px 7px;flex-shrink:0}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:200;
  display:none;align-items:center;justify-content:center;padding:16px}
.modal-bg.open{display:flex}
.modal{width:100%;max-width:720px;max-height:90vh;overflow:auto;
  background:#fff;border-radius:18px;box-shadow:0 20px 70px rgba(0,0,0,.2)}
.modal-head{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--line);
  padding:17px 20px;z-index:1;display:flex;align-items:flex-start;gap:10px}
.modal-head-info{flex:1}
.modal-head h2{font-size:17px;font-weight:800;line-height:1.35}
.modal-head .modal-meta{display:flex;align-items:center;gap:5px;margin-top:5px;flex-wrap:wrap}
.close-btn{border:1px solid var(--line2);background:#fff;border-radius:8px;
  padding:5px 10px;cursor:pointer;font-size:12px;font-weight:700;flex-shrink:0}
.modal-body{padding:18px 20px;display:flex;flex-direction:column;gap:10px}
.info-block{border:1px solid var(--line);border-radius:11px;padding:13px 14px}
.info-block h4{font-size:9px;text-transform:uppercase;letter-spacing:.08em;
  color:var(--sub);margin-bottom:7px;font-weight:900}
.info-block p{font-size:13px;color:var(--muted);line-height:1.65}
.info-block.insight{background:#fffbf0;border-color:#f2d98a}
.info-block.insight h4{color:#7a4e00}
.info-block.insight p{color:#5a3800}
.info-block.action{background:#f0f5ff;border-color:#c2d4f8}
.info-block.action h4{color:#103270}
.info-block.action p{color:#1a3a70}
.info-block.sources{background:#f5fbf7;border-color:#b8e4c8}
.info-block.sources h4{color:#145530}
.src-link{display:flex;align-items:center;gap:10px;
  border:1px solid var(--line);background:var(--surf2);border-radius:9px;
  padding:10px 12px;margin-bottom:6px;text-decoration:none;
  transition:border-color .12s,background .12s}
.src-link:hover{border-color:var(--blu);background:var(--blu-bg)}
.src-link:last-child{margin-bottom:0}
.src-arrow{font-size:14px;color:var(--blu);flex-shrink:0}
.src-info b{display:block;font-size:12px;margin-bottom:2px}
.src-info small{font-size:10px;color:var(--sub)}

@media(max-width:1060px){
  .side{display:none}
  .main{margin-left:0}
  .layout{grid-template-columns:1fr}
  .metrics{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:640px){
  .metrics{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="logo">
    <div class="logo-mark">CW</div>
    커넥트웨이브 채용 인텔리전스
  </div>
  <div class="top-r">
    <div class="live-dot"><i></i>실시간 모니터링</div>
    <span id="lastUpdated" style="font-size:10px;color:var(--muted)"></span>
    <button class="btn" onclick="manualRefresh()">↻ 지금 수집</button>
    <button class="btn" onclick="downloadCSV()">↓ CSV</button>
  </div>
</header>

<!-- SIDEBAR -->
<aside class="side">
  <div class="side-inner">
    <!-- Calendar -->
    <div class="cal-wrap">
      <div class="cal-head">
        <button class="cal-nav" onclick="calNav(-1)">‹</button>
        <strong id="calLabel">2026.05</strong>
        <button class="cal-nav" onclick="calNav(1)">›</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>

    <!-- View mode -->

    </div>

    <!-- Archive -->
    <div class="side-sec-lbl">아카이브</div>
    <div id="archList"></div>
  </div>
</aside>

<!-- MAIN -->
<main class="main">

  <!-- 즉시주목 -->
  <section class="urgent">
    <div class="urgent-head">
      <span class="badge">즉시 주목</span>
      <h2>인재 이탈 가능성이 높은 기업 — 컨택 권장</h2>
    </div>
    <div class="urgent-list" id="urgentList"></div>
  </section>

  <!-- 지표 -->
  <section class="metrics" id="metricsRow"></section>

  <!-- 피드 + 사이드 -->
  <section class="layout">
    <div>
      <div class="feed-head">
        <button class="btn" style="padding:5px 8px" onclick="shiftDate(-1)">‹</button>
        <div class="feed-title" id="feedTitle">—</div>
        <button class="btn" style="padding:5px 8px" onclick="shiftDate(1)">›</button>
        <div class="ctl">
          <input id="kw" placeholder="기업명, 키워드" oninput="renderFeed()">
          <select id="catSel" onchange="syncChips();renderFeed()">
            <option value="all">전체</option>
            <option value="leader">리더 이탈</option>
            <option value="outflow">인재 유출</option>
            <option value="hiring">채용 확대</option>
            <option value="foreign">해외/외국계</option>
            <option value="hr">HR NEWS</option>
          </select>
        </div>
      </div>
      <div class="chips">
        <button class="chip active" data-cat="all" onclick="setCat('all',this)">전체</button>
        <button class="chip" data-cat="leader" onclick="setCat('leader',this)">리더 이탈</button>
        <button class="chip" data-cat="outflow" onclick="setCat('outflow',this)">인재 유출</button>
        <button class="chip" data-cat="hiring" onclick="setCat('hiring',this)">채용 확대</button>
        <button class="chip" data-cat="foreign" onclick="setCat('foreign',this)">해외/외국계</button>
        <button class="chip" data-cat="hr" onclick="setCat('hr',this)">HR NEWS</button>
      </div>
      <div id="feed"></div>
    </div>

    <!-- Right sidebar -->
    <aside>
      <div class="aside-card">
        <div class="aside-title">인재 유출 TOP 5</div>
        <div class="rank" id="rankOutflow"></div>
      </div>
      <div class="aside-card">
        <div class="aside-title">리더 이탈 TOP 5</div>
        <div class="rank" id="rankLeader"></div>
      </div>
      <div class="aside-card">
        <div class="aside-title">신뢰도 기준</div>
        <div class="cred-item">
          <span class="cred-badge lv-a">A</span>
          <span style="font-size:11px;color:var(--muted)">공시·정부기관·공식자료·IR</span>
        </div>
        <div class="cred-item">
          <span class="cred-badge lv-b">B</span>
          <span style="font-size:11px;color:var(--muted)">주요 언론·복수 기사·전문지</span>
        </div>
        <div class="cred-item">
          <span class="cred-badge lv-c">C</span>
          <span style="font-size:11px;color:var(--muted)">LinkedIn·블라인드·커뮤니티</span>
        </div>
      </div>
      <div class="aside-card">
        <div class="aside-title">CW 경쟁사 타겟</div>
        <div id="compList"></div>
      </div>
    </aside>
  </section>
</main>

<!-- Modal -->
<div class="modal-bg" id="modalBg" onclick="closeBg(event)">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-head-info">
        <h2 id="mTitle">—</h2>
        <div class="modal-meta" id="mMeta"></div>
      </div>
      <button class="close-btn" onclick="closeModal()">닫기</button>
    </div>
    <div class="modal-body" id="mBody"></div>
  </div>
</div>

/* ── 날짜 목록 (실제 데이터 있는 날짜만) ── */
const DATA_DATES = [...new Set(ENTRIES.map(e=>e.date))].sort();
const LAST_DATE  = DATA_DATES[DATA_DATES.length - 1]; // "2026-05-11"

/* ── KST 날짜 유틸 ── */
const KST = 'Asia/Seoul';
function kstParts(ds){
  const utc = new Date(ds+'T03:00:00Z');
  const fmt = new Intl.DateTimeFormat('ko-KR',{timeZone:KST,year:'numeric',month:'numeric',day:'numeric',weekday:'narrow'});
  const p={};
  fmt.formatToParts(utc).forEach(({type,value})=>{p[type]=value});
  const WO=['월','화','수','목','금','토','일'];
  p.wi=WO.indexOf(p.weekday);
  p.isWE=p.wi>=5;
  return p;
}
function todayKST(){
  return new Intl.DateTimeFormat('sv-SE',{timeZone:KST}).format(new Date());
}
function firstOffset(y,m){
  const ds=`${y}-${String(m+1).padStart(2,'0')}-01`;
  return kstParts(ds).wi;
}
function lastDay(y,m){return new Date(y,m+1,0).getDate()}
function pad2(n){return String(n).padStart(2,'0')}
function dateFmt(ds){
  const p=kstParts(ds);
  return `${p.year}년 ${p.month}월 ${p.day}일 (${p.weekday})`;
}

/* ── STATE ── */
let selRange={type:'daily',start:LAST_DATE,end:LAST_DATE,label:dateFmt(LAST_DATE)};
let calY=2026,calM=4; // 0-indexed month → May 2026
let viewMode='daily';
const TODAY=todayKST();

/* ── CALENDAR ── */
function buildCal(){
  const y=calY,m=calM;
  document.getElementById('calLabel').textContent=`${y}.${pad2(m+1)}`;
  const grid=document.getElementById('calGrid');
  const DOW=['월','화','수','목','금','토','일'];
  grid.innerHTML=DOW.map((d,i)=>`<div class="dow" ${i>=5?'style="color:var(--red)"':''}>${d}</div>`).join('');
  const off=firstOffset(y,m);
  for(let i=0;i<off;i++) grid.innerHTML+=`<div class="day empty"></div>`;
  const last=lastDay(y,m);
  const dotSet=new Set(DATA_DATES);
  const activeStart=selRange.start,activeEnd=selRange.end;
  for(let d=1;d<=last;d++){
    const ds=`${y}-${pad2(m+1)}-${pad2(d)}`;
    const hasData=dotSet.has(ds);
    const isActive=ds>=activeStart&&ds<=activeEnd;
    const isToday=ds===TODAY&&!isActive;
    const parts=kstParts(ds);
    const cls=['day',hasData?'has':'',isActive?'active':'',isToday?'today':'',parts.isWE&&!isActive?'weekend':''].filter(Boolean).join(' ');
    const onclick=hasData?`onclick="pickDay('${ds}')"`:ds<=TODAY?`onclick="pickDay('${ds}')"`:''
    grid.innerHTML+=`<div class="${cls}" ${onclick}>${d}</div>`;
  }
}

function calNav(dir){
  let idx=(calY-2026)*12+calM+dir;
  // allow 2026-04 to 2027-12
  if(idx<3||idx>23)return;
  calY=2026+Math.floor(idx/12);calM=idx%12;
  buildCal();
}

/* ── ARCHIVE ── */
function buildArchive(){
  const el=document.getElementById('archList');
  el.innerHTML='';
  if(viewMode==='daily'){
    [...DATA_DATES].reverse().forEach(ds=>{
      const cnt=ENTRIES.filter(e=>e.date===ds).length;
      const p=kstParts(ds);
      const active=selRange.type==='daily'&&selRange.start===ds;
      const b=document.createElement('button');
      b.className='arch-item'+(active?' active':'');
      b.innerHTML=`<span class="arch-lbl">${p.month}/${p.day}(${p.weekday})</span><span class="arch-cnt">${cnt}</span>`;
      b.onclick=()=>pickDay(ds);
      el.appendChild(b);
    });
  } else if(viewMode==='weekly'){
    // Build Mon-Sun weeks covering 2026-04-01 to LAST_DATE
    const weeks=buildWeeks();
    [...weeks].reverse().forEach(w=>{
      const cnt=ENTRIES.filter(e=>e.date>=w.start&&e.date<=w.end).length;
      const active=selRange.type==='weekly'&&selRange.start===w.start;
      const b=document.createElement('button');
      b.className='arch-item'+(active?' active':'');
      const sp=kstParts(w.start),ep=kstParts(w.end);
      b.innerHTML=`<div style="width:100%">
        <div class="arch-lbl">${sp.month}/${sp.day} ~ ${ep.month}/${ep.day}<span class="arch-cnt" style="float:right">${cnt}</span></div>
      </div>`;
      b.onclick=()=>pickWeek(w);
      el.appendChild(b);
    });
  } else {
    // Monthly
    const months=buildMonths();
    [...months].reverse().forEach(mo=>{
      const cnt=ENTRIES.filter(e=>e.date>=mo.start&&e.date<=mo.end).length;
      const active=selRange.type==='monthly'&&selRange.start===mo.start;
      const b=document.createElement('button');
      b.className='arch-item'+(active?' active':'');
      b.innerHTML=`<span class="arch-lbl">${mo.label}</span><span class="arch-cnt">${cnt}</span>`;
      b.onclick=()=>pickMonth(mo);
      el.appendChild(b);
    });
  }
}

function buildWeeks(){
  const start=new Date('2026-04-01T03:00:00Z');
  const end=new Date(LAST_DATE+'T03:00:00Z');
  const weeks=[];
  let cur=new Date(start);
  // align to Monday
  const dow=(cur.getDay()+6)%7; // 0=Mon
  cur.setDate(cur.getDate()-dow);
  while(cur<=end){
    const wStart=new Date(cur);
    const wEnd=new Date(cur);wEnd.setDate(wEnd.getDate()+6);
    const s=new Intl.DateTimeFormat('sv-SE',{timeZone:KST}).format(wStart);
    const e=new Intl.DateTimeFormat('sv-SE',{timeZone:KST}).format(wEnd);
    // Only include weeks that overlap with our data range
    if(e>='2026-04-01'&&s<=LAST_DATE){
      weeks.push({start:s>='2026-04-01'?s:'2026-04-01',end:e<=LAST_DATE?e:LAST_DATE});
    }
    cur.setDate(cur.getDate()+7);
  }
  return weeks;
}

function buildMonths(){
  const months=[];
  // 2026-04 and 2026-05 (partial)
  [{y:2026,m:4},{y:2026,m:5}].forEach(({y,m})=>{
    const s=`${y}-${pad2(m)}-01`;
    const lastD=lastDay(y,m-1);
    const e=`${y}-${pad2(m)}-${pad2(lastD)}`;
    const start=s;
    const end=e<LAST_DATE?e:LAST_DATE;
    if(start<=LAST_DATE)months.push({label:`${y}년 ${m}월`,start,end});
  });
  return months;
}

/* ── PICK handlers ── */
function pickDay(ds){
  selRange={type:'daily',start:ds,end:ds,label:dateFmt(ds)};
  calY=Number(ds.slice(0,4));calM=Number(ds.slice(5,7))-1;
  renderAll();
}
function pickWeek(w){
  const sp=kstParts(w.start),ep=kstParts(w.end);
  selRange={type:'weekly',start:w.start,end:w.end,
    label:`${sp.month}/${sp.day} ~ ${ep.month}/${ep.day}`};
  renderAll();
}
function pickMonth(mo){
  selRange={type:'monthly',start:mo.start,end:mo.end,label:mo.label};
  renderAll();
}
function setView(v){
  viewMode=v;
  ['daily','weekly','monthly'].forEach(x=>{
    document.getElementById('btn-'+x).classList.toggle('active',x===v);
  });
  buildArchive();
}
function shiftDate(dir){
  if(selRange.type!=='daily')return;
  const idx=DATA_DATES.indexOf(selRange.start);
  const next=DATA_DATES[idx-dir];
  if(next)pickDay(next);
}

/* ── 중요도 점수 계산 ── */
function calcScore(e){
  const catBase={leader:90,outflow:80,hr:50,hiring:40,foreign:35};
  const urgBonus={high:15,mid:7,low:0};
  const levBonus={A:10,B:5,C:0};
  return (catBase[e.cat]||30)+(urgBonus[e.urgency||'low']||0)+(e.priority?20:0)+(levBonus[e.level]||0);
}

/* ── FILTER (중요도 정렬) ── */
function getFiltered(){
  const q=document.getElementById('kw').value.trim().toLowerCase();
  const cat=document.getElementById('catSel').value;
  const base=ENTRIES
    .filter(e=>e.date>=selRange.start&&e.date<=selRange.end)
    .filter(e=>cat==='all'||e.cat===cat)
    .filter(e=>!q||[e.company,e.title,e.body,e.insight,e.action,e.signal,...(e.tags||[])].join(' ').toLowerCase().includes(q));
  // 최신 날짜 우선 → 같은 날짜면 중요도 내림차순
  return base.sort((a,b)=>
    b.date.localeCompare(a.date) ||
    calcScore(b)-calcScore(a)
  );
}

function renderUrgent(){
  // 즉시주목 = "인재 이탈 가능성이 높은 기업 — 컨택 권장"
  // 조건: 권고사직·구조조정·리더이탈·대규모 인재유출 예상 기업
  //   - cat=leader, priority=true (리더이탈 → 팀이탈 연쇄 가능)
  //   - cat=outflow, priority=true, urgency=high (대규모 권고사직·구조조정)
  // 정렬: 최신 날짜 우선 → 같은 날짜면 점수 순
  const pool=ENTRIES
    .filter(e=>{
      if(!e.priority) return false;
      if(e.cat==='leader') return true;
      if(e.cat==='outflow' && e.urgency==='high') return true;
      return false;
    })
    .sort((a,b)=>
      b.date.localeCompare(a.date) ||
      calcScore(b)-calcScore(a)
    );
  const seen=new Set(), list=[];
  for(const e of pool){
    const key=e.company.split(/[··]/)[0].replace(/\s/g,'').slice(0,8);
    if(seen.has(key)) continue;
    seen.add(key); list.push(e);
    if(list.length>=6) break;
  }
  document.getElementById('urgentList').innerHTML=list.length===0
    ? '<div style="font-size:12px;color:var(--muted);padding:4px 0">현재 즉시 주목 이슈 없음</div>'
    : list.map(e=>`
    <button class="urgent-item" onclick="openModal('${e.id}')">
      <span class="urgent-co">${e.company}</span>
      <span class="urgent-ttl">${e.title}</span>
      <span style="font-size:9px;color:var(--sub);flex-shrink:0">${e.date.slice(5)}</span>
    </button>`).join('');
}

  list.forEach(e=>{

/* ── TOP5 랭킹 (기업별 중복 완전 제거) ── */
function renderRanks(){
  // 인재 유출: 기업별 최고 점수 항목만
  const outflowMap=new Map();
  ENTRIES.filter(e=>e.cat==='outflow').forEach(e=>{
    const key=e.company.split(/[··]/)[0].replace(/\s/g,'').slice(0,8);
    if(!outflowMap.has(key)||calcScore(e)>calcScore(outflowMap.get(key)))
      outflowMap.set(key,e);
  });
  const outflow=[...outflowMap.values()].sort((a,b)=>calcScore(b)-calcScore(a)).slice(0,5);
  document.getElementById('rankOutflow').innerHTML=outflow.length
    ?outflow.map((e,i)=>`
    <button onclick="openModal('${e.id}')">
      <span class="rk">${i+1}</span>
      <span style="flex:1"><div class="rank-co">${e.company}</div><div class="rank-sig">${e.signal}</div></span>
    </button>`).join('')
    :'<div style="font-size:11px;color:var(--muted);padding:6px">수집된 데이터 없음</div>';

  // 리더 이탈: 기업별 최고 점수 항목만
  const leaderMap=new Map();
  ENTRIES.filter(e=>e.cat==='leader').forEach(e=>{
    const key=e.company.split(/[··]/)[0].replace(/\s/g,'').slice(0,8);
    if(!leaderMap.has(key)||calcScore(e)>calcScore(leaderMap.get(key)))
      leaderMap.set(key,e);
  });
  const leaders=[...leaderMap.values()].sort((a,b)=>calcScore(b)-calcScore(a)).slice(0,5);
  document.getElementById('rankLeader').innerHTML=leaders.length
    ?leaders.map((e,i)=>`
    <button onclick="openModal('${e.id}')">
      <span class="rk">${i+1}</span>
      <span style="flex:1"><div class="rank-co">${e.company}</div><div class="rank-sig">${e.signal}</div></span>
    </button>`).join('')
    :'<div style="font-size:11px;color:var(--muted);padding:6px">수집된 데이터 없음</div>';
}

/* ── CSV ── */
function downloadCSV(){
  const rows=[['날짜','시간','카테고리','기업명','신호','제목','신뢰도','우선순위','태그']];
  ENTRIES.forEach(e=>rows.push([e.date,e.time,CAT_LABEL[e.cat],e.company,e.signal,e.title,e.level,e.priority?'Y':'N',e.tags.join('|')]));
  const csv=rows.map(r=>r.map(v=>`"${String(v).replaceAll('"','""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}));
  a.download=`cw_intel_${LAST_DATE}.csv`;a.click();
}

/* ── 동적 data.json 로딩 (배포 환경에서 최신 데이터 자동 반영) ── */
async function loadLatestData(){
  try{
    const r = await fetch('./data.json?t='+Date.now());
    if(!r.ok) return;
    const history = await r.json();
    if(!Array.isArray(history)||!history.length) return;

    // 새 항목만 ENTRIES에 병합 (기존 id 유지, 중복 스킵)
    const existingIds = new Set(ENTRIES.map(e=>e.id));
    let added = 0;
    for(const report of history){
      const items = report.items || [];
      for(const item of items){
        if(existingIds.has(item.id)) continue;
        // data.json 필드 → ENTRIES 필드 매핑
        ENTRIES.push({
          id:      item.id,
          date:    item.date,
          time:    item.time||'09:00',
          cat:     item.cat,
          priority:item.priority||false,
          urgency: item.urgency||'low',
          company: item.company||'',
          signal:  item.signal||'',
          level:   item.level||'B',
          title:   item.title||'',
          body:    item.body||'',
          insight: item.insight||'',
          action:  item.action||'',
          tags:    item.tags||[],
          sources: (item.sources||[]).filter(s=>s.url&&!s.url.includes('search.naver.com'))
        });
        existingIds.add(item.id);
        added++;
      }
    }

    if(added>0){
      // 날짜 목록 갱신
      DATA_DATES.length=0;
      const ds=[...new Set(ENTRIES.map(e=>e.date))].sort();
      DATA_DATES.push(...ds);
      // 최신 날짜로 뷰 이동
      const latest = DATA_DATES[DATA_DATES.length-1];
      pickDay(latest);
      console.log(`✅ data.json에서 ${added}건 신규 로드`);
    }

    // 최종 업데이트 시각 표시
    const lastDate = history[0]?.date;
    if(lastDate){
      const el = document.getElementById('lastUpdated');
      if(el) el.textContent = `최신: ${lastDate} · 매일 10:00 KST 자동 수집`;
    }
  } catch(e){
    // 로컬 파일 시스템에서는 CORS 오류 발생 — 무시
    console.log('data.json 로드 스킵 (로컬 환경)');
  }
}

/* ── 수동 새로고침 ── */
function manualRefresh(){
  document.querySelector('.live-dot').style.opacity='0.4';
  loadLatestData().finally(()=>{
    document.querySelector('.live-dot').style.opacity='1';
  });
}
